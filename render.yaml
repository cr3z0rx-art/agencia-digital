services:
  - type: web
    name: multivenza-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT "ghl-integration.webhook_server:app"
    envVars:
      - key: GHL_API_KEY
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RETELL_API_KEY
        sync: false
      - key: RETELL_AGENT_ID
        sync: false
      - key: RETELL_NUMBER
        sync: false
      - key: RETELL_WEBHOOK_SECRET
        sync: false
      - key: GHL_PHONE_NUMBER
        sync: false
      - key: GHL_FROM_EMAIL
        sync: false
      - key: GHL_FROM_NAME
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
