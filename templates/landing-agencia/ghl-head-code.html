<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
    /* Fonts inline — garantiza carga aunque GHL ignore el <link> del head */
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');
    :root {
      --teal:#1A9E8F; --teal-dark:#0D7A6E; --orange:#F47B20; --orange-dark:#C9620F;
      --red:#E8404A; --bg:#0A0F14; --bg2:#111820; --bg3:#161E28;
      --text:#F0F0F0; --text-muted:#8A9BAE;
      --border:rgba(26,158,143,.25); --card-bg:rgba(17,24,32,.85);
      --radius:14px; --transition:.3s cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.65;overflow-x:hidden}
    a{color:inherit;text-decoration:none}
    ul{list-style:none}
    h1,h2,h3,h4{font-family:'Syne',sans-serif;line-height:1.2}
    h1{font-size:clamp(2rem,5.5vw,3.6rem);font-weight:800}
    h2{font-size:clamp(1.5rem,3.5vw,2.4rem);font-weight:700}
    h3{font-size:clamp(1rem,2vw,1.3rem);font-weight:700}
    .teal{color:var(--teal)} .orange{color:var(--orange)}
    .container{max-width:1100px;margin:0 auto;padding:0 24px}
    .container-sm{max-width:760px;margin:0 auto;padding:0 24px}
    section{padding:80px 0}
    .fade-up{opacity:0;transform:translateY(28px);transition:opacity .6s ease,transform .6s ease}
    .fade-up.visible{opacity:1;transform:translateY(0)}
    .d1{transition-delay:.1s} .d2{transition-delay:.2s} .d3{transition-delay:.3s} .d4{transition-delay:.4s} .d5{transition-delay:.5s}

    /* ── LANG ── */
    .lang-es,.block-es{display:none}
    .lang-en{display:inline}
    .block-en{display:block}
    body.es .lang-es{display:inline} body.es .lang-en{display:none}
    body.es .block-es{display:block} body.es .block-en{display:none}
    .lang-toggle{display:flex;align-items:center;background:rgba(26,158,143,.1);border:1px solid var(--border);border-radius:99px;padding:3px;gap:2px}
    .lang-toggle button{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;padding:5px 12px;border-radius:99px;cursor:pointer;color:var(--text-muted);transition:all .2s}
    .lang-toggle button.active{background:var(--teal);color:#fff}

    /* ── NAV ── */
    nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,15,20,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);transition:var(--transition)}
    .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;max-width:1100px;margin:0 auto;gap:12px}
    .logo{display:flex;align-items:center;gap:10px}
    .logo-text{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800}
    .logo-multi{color:var(--teal)} .logo-venza{color:var(--orange)}
    .logo-sub{font-size:.6rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:-3px}
    .nav-right{display:flex;align-items:center;gap:12px}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
    .hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:var(--transition)}
    .nav-links{display:flex;flex-direction:row;align-items:center;gap:32px}
    .nav-links a{color:var(--text-muted);font-size:.9rem;font-weight:500;transition:var(--transition);white-space:nowrap;text-decoration:none}
    .nav-links a:hover{color:var(--text)}
    .nav-links-mobile{display:none}

    /* ── BTN ── */
    .btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:8px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.95rem;cursor:pointer;border:none;transition:var(--transition);white-space:nowrap}
    .btn-primary{background:var(--orange);color:#fff}
    .btn-primary:hover{background:var(--orange-dark);transform:translateY(-2px);box-shadow:0 8px 28px rgba(244,123,32,.4)}
    .btn-outline{background:transparent;color:var(--teal);border:1.5px solid var(--teal)}
    .btn-outline:hover{background:var(--teal);color:#fff;transform:translateY(-2px)}
    .btn-lg{padding:17px 36px;font-size:1.05rem}
    .btn-full{width:100%;justify-content:center}

    /* ── HERO ── */
    #hero{min-height:100vh;display:flex;align-items:center;padding-top:80px;position:relative;overflow:hidden}
    .hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 60% 30%,rgba(26,158,143,.12) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(244,123,32,.07) 0%,transparent 60%);pointer-events:none}
    .hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(26,158,143,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(26,158,143,.06) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;mask-image:linear-gradient(to right,transparent 40%,rgba(0,0,0,.6) 70%,rgba(0,0,0,.8) 100%);-webkit-mask-image:linear-gradient(to right,transparent 40%,rgba(0,0,0,.6) 70%,rgba(0,0,0,.8) 100%)}
    .hero-content{position:relative;z-index:1;max-width:720px}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(26,158,143,.12);border:1px solid rgba(26,158,143,.3);border-radius:99px;padding:6px 16px;font-size:.82rem;color:var(--teal);font-weight:500;margin-bottom:28px;width:fit-content}
    .hero-badge span:first-child{width:6px;height:6px;background:var(--teal);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
    .hero-h1{margin-bottom:22px}
    .hero-sub{color:var(--text-muted);font-size:1.05rem;max-width:580px;margin-bottom:20px}
    .hero-checks{display:flex;flex-wrap:wrap;gap:10px 24px;margin-bottom:36px}
    .hero-check{display:flex;align-items:center;gap:8px;font-size:.9rem;font-weight:500}
    .hero-check::before{content:"✔";color:var(--teal);font-weight:700}
    .hero-ctas{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:48px}
    .hero-stats{display:flex;gap:40px;flex-wrap:wrap;padding-top:32px;border-top:1px solid var(--border)}
    .stat-num{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--teal);line-height:1}
    .stat-label{font-size:.8rem;color:var(--text-muted);margin-top:4px}

    /* ── CREDIBILITY BAR ── */
    #cred{background:var(--bg2);padding:40px 0}
    .cred-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:14px}
    .cred-item{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:99px;padding:9px 20px;font-size:.86rem;font-weight:500}
    .cred-item::before{content:"✔";color:var(--teal);font-weight:700}

    /* ── SECTION LABELS ── */
    .section-tag{display:inline-block;font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;border-radius:99px;padding:4px 14px;margin-bottom:16px}
    .tag-teal{background:rgba(26,158,143,.1);color:var(--teal);border:1px solid rgba(26,158,143,.25)}
    .tag-orange{background:rgba(244,123,32,.1);color:var(--orange);border:1px solid rgba(244,123,32,.3)}
    .tag-red{background:rgba(232,64,74,.1);color:var(--red);border:1px solid rgba(232,64,74,.3)}
    .divider{height:1px;background:var(--border)}

    /* ── PROBLEMA ── */
    #problema{background:var(--bg);text-align:center}
    .problem-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:36px}
    .problem-card{background:var(--bg3);border:1px solid rgba(232,64,74,.2);border-radius:var(--radius);padding:22px 24px;display:flex;align-items:flex-start;gap:14px;text-align:left;transition:border-color var(--transition),transform var(--transition)}
    .problem-card:hover{border-color:rgba(232,64,74,.5);transform:translateY(-3px)}
    .problem-x{color:var(--red);font-weight:700;font-size:1.1rem;flex-shrink:0;margin-top:2px}
    .problem-callout{margin-top:32px;padding:22px 32px;background:rgba(232,64,74,.06);border:1px solid rgba(232,64,74,.25);border-radius:var(--radius);font-size:1.05rem;font-weight:600;color:var(--red)}

    /* ── SOLUCIÓN ── */
    #solucion{background:var(--bg2)}
    .steps{display:flex;flex-direction:column;gap:16px;margin-top:36px}
    .step{display:flex;align-items:flex-start;gap:20px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:22px 26px;transition:border-color var(--transition),transform var(--transition)}
    .step:hover{border-color:var(--teal);transform:translateX(4px)}
    .step-num{width:44px;height:44px;border-radius:50%;background:rgba(26,158,143,.12);border:1.5px solid var(--teal);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:var(--teal);font-size:1.1rem;flex-shrink:0}
    .step-title{color:var(--teal);margin-bottom:4px;font-size:1rem}
    .step-desc{font-size:.88rem;color:var(--text-muted)}

    /* ── SERVICIOS ── */
    #servicios{background:var(--bg)}
    .services-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px;margin-top:48px}
    .leadgen-card{background:var(--card-bg);border:2px solid var(--orange);border-radius:var(--radius);padding:32px 36px;display:flex;align-items:flex-start;gap:32px;margin-top:48px}
    .leadgen-icon{font-size:2.4rem;flex-shrink:0;margin-top:4px}
    .leadgen-body{flex:1}
    .leadgen-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:6px}
    .leadgen-price{color:var(--orange);font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:12px}
    .leadgen-desc{color:var(--text-muted);font-size:.9rem;margin-bottom:18px;line-height:1.6}
    .leadgen-feats{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px}
    .leadgen-feat{background:rgba(244,123,32,.1);border:1px solid rgba(244,123,32,.25);border-radius:99px;padding:5px 14px;font-size:.8rem;color:var(--orange);font-weight:500}
    @media(max-width:640px){.leadgen-card{flex-direction:column;gap:16px}}
    .svc{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:32px 26px;display:flex;flex-direction:column;position:relative;overflow:hidden;transition:border-color var(--transition),transform var(--transition),box-shadow var(--transition)}
    .svc:hover{transform:translateY(-5px);box-shadow:0 20px 48px rgba(0,0,0,.35)}
    .svc.featured{border-color:var(--orange);box-shadow:0 0 0 1px var(--orange),0 12px 40px rgba(244,123,32,.15)}
    .svc.featured::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--orange),var(--teal))}
    .svc-popular{position:absolute;top:16px;right:16px;background:var(--orange);color:#fff;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:99px}
    .svc-icon{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;margin-bottom:20px}
    .icon-teal{background:rgba(26,158,143,.12)} .icon-orange{background:rgba(244,123,32,.12)}
    .svc-name{font-size:1.2rem;margin-bottom:6px}
    .svc-setup{font-size:.8rem;color:var(--text-muted);margin-bottom:4px}
    .svc-price{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;color:var(--teal);line-height:1;margin-bottom:2px}
    .svc.featured .svc-price{color:var(--orange)}
    .svc-period{font-size:.82rem;color:var(--text-muted);margin-bottom:18px}
    .svc-desc{font-size:.88rem;color:var(--text-muted);margin-bottom:20px;line-height:1.6}
    .svc-features{display:flex;flex-direction:column;gap:8px;margin-bottom:22px;flex:1}
    .svc-feat{display:flex;align-items:flex-start;gap:8px;font-size:.86rem}
    .feat-check{color:var(--teal);flex-shrink:0;margin-top:1px}
    .svc.featured .feat-check{color:var(--orange)}
    .svc-guarantee{background:rgba(26,158,143,.07);border:1px solid rgba(26,158,143,.2);border-radius:8px;padding:10px 14px;font-size:.8rem;color:var(--teal);margin-bottom:20px}
    .svc.featured .svc-guarantee{background:rgba(244,123,32,.07);border-color:rgba(244,123,32,.2);color:var(--orange)}
    .svc-btn{width:100%;text-align:center;justify-content:center}
    .svc:not(.featured) .svc-btn{background:transparent;color:var(--teal);border:1.5px solid var(--teal)}
    .svc:not(.featured) .svc-btn:hover{background:var(--teal);color:#fff}

    /* ── CEO ── */
    #ceo{background:var(--bg2)}
    .ceo-inner{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
    .ceo-photo-wrap{position:relative}
    .ceo-photo-bg{width:100%;max-width:360px;aspect-ratio:3/4;border-radius:20px;background:linear-gradient(135deg,var(--teal-dark),var(--bg3));border:1px solid rgba(26,158,143,.4);overflow:hidden;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(26,158,143,.2)}
    .ceo-photo-bg img{width:100%;height:100%;object-fit:cover;object-position:center top;filter:saturate(0) contrast(1.1) brightness(1.05);mix-blend-mode:normal;opacity:1}
    .ceo-photo-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,15,20,.15) 0%,transparent 30%,transparent 55%,rgba(10,15,20,.85) 100%)}
    .ceo-photo-bg::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(26,158,143,.25) 0%,transparent 50%,rgba(244,123,32,.15) 100%);z-index:1;pointer-events:none}
    .ceo-badge-wrap{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);white-space:nowrap}
    .ceo-badge{display:inline-flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--orange);border-radius:99px;padding:8px 20px;font-size:.82rem;font-weight:600;color:var(--orange);box-shadow:0 8px 24px rgba(0,0,0,.4)}
    .ceo-badge::before{content:"👤";font-size:.9rem}
    .ceo-text h2{margin-bottom:8px}
    .ceo-role{display:inline-flex;align-items:center;gap:6px;color:var(--teal);font-weight:600;font-size:.9rem;margin-bottom:20px}
    .ceo-role::before{content:"";width:20px;height:2px;background:var(--teal);border-radius:2px}
    .ceo-bio{color:var(--text-muted);font-size:.95rem;line-height:1.75;margin-bottom:28px}
    .ceo-values{display:flex;flex-direction:column;gap:12px}
    .ceo-value{display:flex;align-items:flex-start;gap:12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-size:.88rem;transition:border-color var(--transition)}
    .ceo-value:hover{border-color:var(--teal)}
    .ceo-value-icon{font-size:1.1rem;flex-shrink:0}
    .ceo-value strong{display:block;color:var(--text);margin-bottom:2px;font-size:.88rem}
    .ceo-value span{color:var(--text-muted);font-size:.82rem}

    /* ── UBICACION ── */
    #ubicacion{background:var(--bg)}
    .location-inner{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
    .location-info h2{margin-bottom:12px}
    .location-info p{color:var(--text-muted);font-size:.95rem;line-height:1.7;margin-bottom:24px}
    .location-details{display:flex;flex-direction:column;gap:12px}
    .loc-detail{display:flex;align-items:center;gap:12px;font-size:.9rem}
    .loc-icon{width:36px;height:36px;border-radius:8px;background:rgba(26,158,143,.1);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .map-wrap{border-radius:16px;overflow:hidden;border:1px solid var(--border);background:var(--bg3);height:340px;position:relative}
    .map-wrap iframe{width:100%;height:100%;border:none;filter:invert(1) hue-rotate(180deg) brightness(.9) contrast(1.1) saturate(.8)}

    /* ── FILTRO ── */
    #filtro{background:var(--bg2)}
    .filtro-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:36px}
    .filtro-card{background:var(--bg3);border-radius:var(--radius);padding:28px}
    .filtro-card.no{border:1px solid rgba(232,64,74,.25)}
    .filtro-card.yes{border:1px solid rgba(26,158,143,.3)}
    .filtro-header{display:flex;align-items:center;gap:8px;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:18px}
    .filtro-card.no .filtro-header{color:var(--red)}
    .filtro-card.yes .filtro-header{color:var(--teal)}
    .filtro-items{display:flex;flex-direction:column;gap:10px}
    .filtro-item{display:flex;align-items:flex-start;gap:10px;font-size:.88rem;color:var(--text-muted)}
    .filtro-card.no .filtro-item::before{content:"✗";color:var(--red);flex-shrink:0;font-weight:700}
    .filtro-card.yes .filtro-item::before{content:"✔";color:var(--teal);flex-shrink:0;font-weight:700}

    /* ── URGENCIA ── */
    #urgencia{background:var(--bg);text-align:center}
    .urgency-box{background:var(--bg3);border:1px solid rgba(244,123,32,.4);border-radius:20px;padding:48px 40px;max-width:600px;margin:0 auto}
    .urgency-num{font-family:'Syne',sans-serif;font-size:5rem;font-weight:800;color:var(--orange);line-height:1;margin-bottom:8px}

    /* ── FAQ ── */
    #faq{background:var(--bg2)}
    .faq-list{display:flex;flex-direction:column;gap:14px;margin-top:36px}
    .faq-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:22px 26px;transition:border-color var(--transition),transform var(--transition);cursor:pointer}
    .faq-item:hover{border-color:var(--teal);transform:translateX(3px)}
    .faq-q{font-family:'Syne',sans-serif;font-weight:700;margin-bottom:8px;font-size:.95rem;color:var(--text)}
    .faq-a{font-size:.88rem;color:var(--text-muted);line-height:1.65}

    /* ── CTA FINAL ── */
    #cta-final{background:var(--bg);text-align:center}
    .cta-box{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:64px 40px;position:relative;overflow:hidden;max-width:720px;margin:0 auto}
    .cta-box::before{content:"";position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(244,123,32,.1),transparent 70%);pointer-events:none}
    .cta-scarcity{display:inline-flex;align-items:center;gap:8px;background:rgba(244,123,32,.1);border:1px solid rgba(244,123,32,.3);border-radius:99px;padding:6px 18px;font-size:.82rem;color:var(--orange);font-weight:600;margin-bottom:24px}
    .cta-scarcity::before{content:"●";font-size:.6rem}
    .cta-note{margin-top:18px;font-size:.82rem;color:var(--text-muted)}

    /* ── FOOTER ── */
    footer{background:var(--bg2);border-top:1px solid var(--border);padding:48px 0 28px}
    .footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:40px;margin-bottom:40px}
    .footer-brand p{color:var(--text-muted);font-size:.88rem;margin-top:14px;max-width:280px;line-height:1.7}
    .footer-col h4{font-family:'Syne',sans-serif;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:16px}
    .footer-col ul{display:flex;flex-direction:column;gap:10px}
    .footer-col ul li{font-size:.88rem;color:var(--text-muted)}
    .footer-col ul li a:hover{color:var(--teal)}
    .footer-bottom{border-top:1px solid var(--border);padding-top:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
    .footer-bottom p{font-size:.8rem;color:var(--text-muted)}

    /* ── RESPONSIVE ── */
    @media(max-width:900px){
      .services-grid{grid-template-columns:1fr}
      .ceo-inner{grid-template-columns:1fr}
      .location-inner{grid-template-columns:1fr}
      .filtro-grid{grid-template-columns:1fr}
      .footer-grid{grid-template-columns:1fr 1fr}
      .footer-brand{grid-column:1/-1}
    }
    @media(max-width:640px){
      section{padding:60px 0}
      .hero-stats{gap:24px}
      .cta-box{padding:36px 22px}
      .urgency-box{padding:36px 22px}
      .hero-ctas{flex-direction:column;align-items:flex-start}
      .footer-grid{grid-template-columns:1fr}
      .footer-bottom{flex-direction:column;text-align:center}
    }
